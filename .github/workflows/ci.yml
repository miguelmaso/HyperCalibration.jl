name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: julia-actions/setup-julia@v3
        with:
          version: '1.10'
      - uses: julia-actions/cache@v3
      - run: julia --project=. -e 'using Pkg; Pkg.test()'
